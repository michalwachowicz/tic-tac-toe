<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/main.css" />
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Tic Tac Toe</h1>
      <div class="grid-container">
        <div class="grid-item" data-item="0">
          <span class="grid-item__text"></span>
        </div>
        <div class="grid-item" data-item="1">
          <span class="grid-item__text"></span>
        </div>
        <div class="grid-item" data-item="2">
          <span class="grid-item__text"></span>
        </div>
        <div class="grid-item" data-item="3">
          <span class="grid-item__text"></span>
        </div>
        <div class="grid-item" data-item="4">
          <span class="grid-item__text"></span>
        </div>
        <div class="grid-item" data-item="5">
          <span class="grid-item__text"></span>
        </div>
        <div class="grid-item" data-item="6">
          <span class="grid-item__text"></span>
        </div>
        <div class="grid-item" data-item="7">
          <span class="grid-item__text"></span>
        </div>
        <div class="grid-item" data-item="8">
          <span class="grid-item__text"></span>
        </div>
      </div>
      <div class="game-over hidden">
        <p class="game-over__winner">Winner: Player</p>
        <button type="button" class="btn btn--reset">Reset</button>
      </div>
    </div>
    <script src="./js/app.js"></script>
  </body>
</html>
